
<h2 class="page-title">Thanush Blog Posts</h2>
<button (click)="getblogpost()">Get All blogPost</button>
@if(blogposts().length>0)
{
    <div class="container mt-4">
  <div class="row g-4">

    @for (blogpost of blogposts(); track blogpost.id) {

      <div class="col-lg-4 col-md-6 col-12">
        <div class="card blog-card h-100 shadow-lg border-0">

          <div class="card-body d-flex flex-column">

            <h5 class="card-title fw-bold">
              {{ blogpost.title }}
            </h5>

            <p class="card-text">
              {{ blogpost.body }}
            </p>

            <div class="mb-3">

              @for (tag of blogpost.tags; track tag) {
                <span class="tag-badge">
                  {{ tag }}
                </span>
              }

            </div>

            <div class="mt-auto stats">
              <small>
                👍 {{ blogpost.reactions.likes }}
                👎 {{ blogpost.reactions.dislikes }}
                👁 {{ blogpost.views }}
              </small>
            </div>

          </div>

        </div>
      </div>

    }

  </div>
</div>

}
